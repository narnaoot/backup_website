<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kit-Cat Pomodoro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e6f8f7;
    background-image: radial-gradient(circle, rgba(100,205,200,0.18) 2px, transparent 2px);
    background-size: 30px 30px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    gap: 18px;
    overflow: hidden;
  }

  .mode-label {
    font-family: 'Fredoka One', cursive;
    font-size: 15px;
    letter-spacing: 0.15em;
    color: #1a8a80;
    text-transform: uppercase;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.8);
  }

  .cat-container {
    width: 240px;
    filter: drop-shadow(0 12px 32px rgba(20,130,125,0.38));
  }

  /* ── TAIL SWING ── */
  #tailGroup {
    transform-box: fill-box;
    transform-origin: 50% 0%;
    animation: swing 1s ease-in-out infinite alternate;
    animation-play-state: paused;
  }

  @keyframes swing {
    from { transform: rotate(-22deg); }
    to   { transform: rotate(22deg);  }
  }

  /* ── EYE TRACKING ── */
  .pupil {
    animation: eyeTrack 1s ease-in-out infinite alternate;
    animation-play-state: paused;
  }

  @keyframes eyeTrack {
    from { transform: translateX(9px);  }
    to   { transform: translateX(-9px); }
  }

  /* ── CONTROLS ── */
  .controls { display: flex; gap: 12px; align-items: center; }

  .btn {
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: linear-gradient(135deg, #45C9C5, #2AAEAA);
    color: #fff;
    box-shadow: 0 4px 16px rgba(66,200,193,0.4), 0 2px 0 rgba(0,0,0,0.1);
  }
  .btn-primary:hover  { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(66,200,193,0.55); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: rgba(255,255,255,0.78);
    color: #1a8a80;
    border: 2px solid #80d8d4;
    font-size: 12px;
    padding: 8px 20px;
  }
  .btn-secondary:hover { background: #fff; border-color: #45C9C5; transform: translateY(-1px); }

  /* ── PIPS ── */
  .status-bar { display: flex; gap: 8px; align-items: center; }

  .pip {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #b0e4e2;
    border: 2px solid #80c8c5;
    transition: all 0.3s;
  }
  .pip.done   { background: #7be0ad; border-color: #40c080; box-shadow: 0 0 8px rgba(64,192,128,0.5); }
  .pip.active { background: #45C9C5; border-color: #2AAEAA; box-shadow: 0 0 10px rgba(66,200,193,0.7); animation: pipPulse 0.8s ease-in-out infinite alternate; }

  @keyframes pipPulse {
    from { transform: scale(1);   box-shadow: 0 0 6px rgba(66,200,193,0.5); }
    to   { transform: scale(1.3); box-shadow: 0 0 14px rgba(66,200,193,0.9); }
  }

  .break-label {
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: #40c080;
    height: 20px;
  }
</style>
</head>
<body>

<p class="mode-label" id="modeLabel">🐱 Work</p>

<div class="cat-container">
<svg viewBox="0 0 280 515" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible;">

  <text id="sessionCount" x="140" y="308" text-anchor="middle" dominant-baseline="middle"

</div>

<div class="status-bar">
  <div class="pip active" id="pip0"></div>
  <div class="pip" id="pip1"></div>
  <div class="pip" id="pip2"></div>
  <div class="pip" id="pip3"></div>
</div>

<div class="break-label" id="breakLabel"></div>

<div class="controls">
  <button class="btn btn-primary" id="startBtn" onclick="toggleTimer()">Start</button>
  <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
</div>

<script>
  const WORK_SECS   = 25 * 60;
  const SHORT_BREAK =  5 * 60;
  const LONG_BREAK  = 15 * 60;
  const SESSIONS    = 4;

  let running   = false;
  let remaining = WORK_SECS;
  let isBreak   = false;
  let session   = 0;
  let interval  = null;

  const timeDisplay  = document.getElementById('timeDisplay');
  const modeLabel    = document.getElementById('modeLabel');
  const sessionCount = document.getElementById('sessionCount');
  const startBtn     = document.getElementById('startBtn');
  const tailGroup    = document.getElementById('tailGroup');
  const clockFace    = document.getElementById('clockFace');
  const breakLabel   = document.getElementById('breakLabel');
  const pupils       = document.querySelectorAll('.pupil');

  function fmt(secs) {
    return `${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')}`;
  }

  function setAnimations(playing) {
    const state = playing ? 'running' : 'paused';
    tailGroup.style.animationPlayState = state;
    pupils.forEach(p => p.style.animationPlayState = state);
  }

  function render() {
    timeDisplay.textContent  = fmt(remaining);
    const isLong = session === SESSIONS - 1 && isBreak;
    modeLabel.textContent    = isBreak ? (isLong ? '☕ Long Break' : '☕ Short Break') : '🐱 Work';
    sessionCount.textContent = `Session ${session + 1} of ${SESSIONS}`;
    breakLabel.textContent   = isBreak ? '☕  Take a breeeeak!' : '';

    clockFace.setAttribute('fill',   isBreak ? '#40b878' : '#35B5B0');
    clockFace.setAttribute('stroke', isBreak ? '#7be0ad' : 'white');
    timeDisplay.setAttribute('fill', isBreak ? '#c8ffe0' : 'white');

    updatePips();
  }

  function updatePips() {
    for (let i = 0; i < SESSIONS; i++) {
      const pip = document.getElementById('pip' + i);
      pip.className = 'pip';
      if (i < session) pip.classList.add('done');
      else if (i === session && !isBreak) pip.classList.add('active');
    }
  }

  function tick() {
    if (remaining <= 0) {
      beep();
      if (!isBreak) {
        isBreak   = true;
        remaining = (session === SESSIONS - 1) ? LONG_BREAK : SHORT_BREAK;
      } else {
        isBreak = false;
        session = (session + 1) % SESSIONS;
        remaining = WORK_SECS;
        if (session === 0) {
          clearInterval(interval);
          interval = null;
          running  = false;
          startBtn.textContent = 'Start';
          setAnimations(false);
          render();
          setTimeout(() => alert('🎉 Pomodoro set complete! Great work!'), 100);
          return;
        }
      }
    } else {
      remaining--;
    }
    render();
  }

  function toggleTimer() {
    if (running) {
      clearInterval(interval);
      interval = null;
      running  = false;
      startBtn.textContent = 'Resume';
      setAnimations(false);
    } else {
      running = true;
      startBtn.textContent = 'Pause';
      setAnimations(true);
      interval = setInterval(tick, 1000);
    }
  }

  function resetTimer() {
    clearInterval(interval);
    interval  = null;
    running   = false;
    isBreak   = false;
    session   = 0;
    remaining = WORK_SECS;
    startBtn.textContent = 'Start';
    setAnimations(false);
    render();
  }

  function beep() {
    try {
      const ctx  = new (window.AudioContext || window.webkitAudioContext)();
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(660, ctx.currentTime);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.0);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 1.0);
    } catch(e) {}
  }

  render();
</script>
</body>
</html>
